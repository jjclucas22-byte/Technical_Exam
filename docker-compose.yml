services:
  api:
    build:
      context: ./api
      dockerfile: ../docker/api/Dockerfile
      target: development
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-sugarcrm}
      DB_USERNAME: ${DB_USERNAME:-sugarcrm}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      ELASTICSEARCH_URL: http://searcher:9200
      ELASTICSEARCH_INDEX: customers
    depends_on:
      database:
        condition: service_healthy
      searcher:
        condition: service_healthy
    command: >-
      sh -c "composer install --no-interaction --prefer-dist && php-fpm"
    restart: unless-stopped

  controller:
    build:
      context: .
      dockerfile: docker/controller/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./api:/var/www/html:ro
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  database:
    image: mysql:8.4
    ports:
      - "${DB_FORWARD_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sugarcrm}
      MYSQL_USER: ${DB_USERNAME:-sugarcrm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - database_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  searcher:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION:-9.2.8}
    ports:
      - "${ELASTICSEARCH_FORWARD_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.license.self_generated.type: basic
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - searcher_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

volumes:
  api_vendor:
  database_data:
  searcher_data:
